services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: duck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: duck
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duck -d duck"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    network_mode: host
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./app.py:/app/app.py:ro
      - ./db.py:/app/db.py:ro
      - ./auth.py:/app/auth.py:ro
      - ./requirements.txt:/app/requirements.txt:ro
      - /home/user/duck-secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pip install bcrypt slowapi prometheus-client -q && uvicorn app:app --host 0.0.0.0 --port 8000"

  nginx:
    image: nginx:1.27-alpine
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/dist:/app/web/dist:ro

volumes:
  pgdata:
